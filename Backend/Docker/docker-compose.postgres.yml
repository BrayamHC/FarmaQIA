name: farmaqia

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgresFarmaQ
    environment:
      POSTGRES_USER: farmaq_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_FQ:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmaq_admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_FQ: