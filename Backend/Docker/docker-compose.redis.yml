name: farmaqia

services:
  redis:
    image: redis:7-alpine
    container_name: redisFarmaQ
    command: >
      sh -c "redis-server
      --appendonly yes
      --requirepass $$REDIS_PASSWORD
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6381:6379"
    volumes:
      - redis_data_FQ:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data_FQ: